<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Incremental | Firebase Messenger</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', 'Fira Code', monospace;
            transition: background-color 0.2s, border-color 0.2s, box-shadow 0.2s;
        }

        /* Чёрная тема (базовая) */
        body[data-theme="dark"] {
            --bg-body: #000000;
            --bg-surface: #050505;
            --bg-elevated: #0a0a0a;
            --border-glow: #ffffff;
            --text-primary: #ffffff;
            --text-secondary: #dddddd;
            --accent: #ffffff;
            --accent-glow: 0 0 20px #ffffff, 0 0 12px #aaaaaa;
            --message-own-bg: #111111;
            --message-other-bg: #080808;
            --btn-bg: #111111;
            --btn-hover: #333333;
            --btn-hover-text: #ffffff;
            --shadow: 0 0 25px rgba(255,255,255,0.3);
            --admin-badge: #ffaa66;
            --gray-text: #aaaaaa;
        }

        body[data-theme="white"] {
            --bg-body: #ffffff;
            --bg-surface: #f8f8ff;
            --bg-elevated: #f0f0fa;
            --border-glow: #ffffff;
            --text-primary: #444444;
            --text-secondary: #666666;
            --accent: #ffffff;
            --accent-glow: 0 0 18px #ffffff, 0 0 10px #aaaaff;
            --message-own-bg: #e8e8f0;
            --message-other-bg: #f5f5ff;
            --btn-bg: #e8e8f0;
            --btn-hover: #ffffff;
            --btn-hover-text: #222;
            --shadow: 0 0 25px rgba(0,0,0,0.15), 0 0 15px #ffffff;
            --admin-badge: #cc8844;
            --gray-text: #888888;
        }

        body[data-theme="green"] {
            --bg-body: #0a1f0a;
            --bg-surface: #0d2a0d;
            --bg-elevated: #143014;
            --border-glow: #2eff9e;
            --text-primary: #ccffcc;
            --text-secondary: #aaffaa;
            --accent: #2eff9e;
            --accent-glow: 0 0 18px #2eff9e, 0 0 8px #6effb0;
            --message-own-bg: #1a3a1a;
            --message-other-bg: #0f2a0f;
            --btn-bg: #1a3a1a;
            --btn-hover: #2eff9e;
            --btn-hover-text: #0a1f0a;
            --shadow: 0 0 25px #2eff9e;
            --admin-badge: #ffcc88;
            --gray-text: #aaffaa;
        }

        body {
            background: var(--bg-body);
            background-image: radial-gradient(var(--accent) 0.4px, transparent 0.4px);
            background-size: 28px 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 20px;
        }

        .global-logo { width: 100%; display: flex; justify-content: center; margin-bottom: 30px; margin-top: 10px; }
        .logo-oval {
            background: transparent;
            border: 2px solid var(--accent);
            border-radius: 60px;
            padding: 8px 32px;
            box-shadow: var(--accent-glow);
        }
        .logo-oval span { font-size: 1.6rem; font-weight: bold; letter-spacing: 4px; color: var(--accent); text-shadow: 0 0 10px var(--accent); }

        .app {
            display: none;
            width: 100%;
            max-width: 1400px;
            background: var(--bg-surface);
            border-radius: 32px;
            border: 2px solid var(--accent);
            overflow: hidden;
            box-shadow: var(--shadow), inset 0 0 8px var(--accent);
            margin-top: 10px;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 12px 24px;
            background: var(--bg-elevated);
            border-bottom: 1px solid var(--accent);
            gap: 12px;
        }
        .admin-btn {
            background: transparent;
            border: 1px solid var(--admin-badge);
            border-radius: 60px;
            padding: 6px 16px;
            color: var(--admin-badge);
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 6px var(--admin-badge);
        }
        .admin-btn:hover { background: var(--admin-badge); color: black; box-shadow: 0 0 15px var(--admin-badge); }
        .profile-oval {
            display: flex;
            align-items: center;
            gap: 12px;
            background: transparent;
            border: 1px solid var(--accent);
            border-radius: 60px;
            padding: 4px 18px 4px 8px;
            cursor: pointer;
            box-shadow: 0 0 10px var(--accent);
        }
        .small-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--bg-elevated); border: 1px solid var(--accent); overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .small-avatar img, .small-avatar span { width: 100%; height: 100%; object-fit: cover; font-size: 24px; }
        .profile-nick { font-weight: bold; color: var(--text-primary); text-shadow: 0 0 4px var(--accent); }
        .logout-icon { background: none; border: none; color: var(--text-secondary); cursor: pointer; margin-left: 8px; font-size: 18px; }

        .tabs { display: flex; background: var(--bg-elevated); gap: 2px; flex-wrap: wrap; }
        .tab {
            flex: 1; text-align: center; padding: 12px; background: var(--bg-surface);
            cursor: pointer; border-bottom: 2px solid transparent; font-weight: bold;
            color: var(--text-secondary);
        }
        .tab.active { border-bottom-color: var(--accent); background: var(--bg-elevated); color: var(--text-primary); text-shadow: 0 0 4px var(--accent); }
        .panel { padding: 20px; display: none; }

        /* ЛЕНТА MEDIA */
        .media-feed {
            display: flex;
            flex-direction: column;
            gap: 24px;
            max-width: 800px;
            margin: 0 auto;
        }
        .media-post {
            background: var(--bg-elevated);
            border: 1px solid var(--accent);
            border-radius: 40px;
            padding: 20px;
            box-shadow: 0 0 15px var(--accent);
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            cursor: pointer;
        }
        .post-avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--bg-surface); border: 1px solid var(--accent); overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .post-author { font-weight: bold; font-size: 1.1rem; color: var(--text-primary); }
        .post-time { font-size: 0.7rem; color: var(--text-secondary); margin-left: auto; }
        .post-text { font-size: 1rem; line-height: 1.4; margin-bottom: 12px; white-space: pre-wrap; }
        .post-image { max-width: 100%; border-radius: 24px; border: 1px solid var(--accent); margin-top: 12px; }
        .post-actions {
            display: flex;
            gap: 24px;
            align-items: center;
            border-top: 1px solid var(--border-glow);
            padding-top: 12px;
            margin-top: 8px;
        }
        .action-btn {
            background: none; border: none; color: var(--gray-text); font-size: 0.85rem;
            cursor: pointer; display: flex; align-items: center; gap: 6px;
            padding: 4px 8px; border-radius: 40px;
        }
        .action-btn:hover { background: rgba(255,255,255,0.1); color: var(--accent); }
        .neon-oval-btn {
            background: transparent; border: 1px solid var(--accent); border-radius: 60px;
            padding: 8px 24px; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 10px var(--accent); color: var(--text-primary);
            margin: 5px; display: inline-block;
        }
        .neon-oval-btn:hover { background: var(--accent); color: var(--btn-hover-text); box-shadow: 0 0 20px var(--accent); }

        /* Сообщения */
        .messages-area {
            height: 45vh;
            background: var(--bg-elevated);
            border-radius: 24px;
            padding: 16px;
            overflow-y: auto;
            border: 1px solid var(--accent);
            box-shadow: inset 0 0 8px rgba(0,0,0,0.2), 0 0 15px var(--accent);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            background: var(--message-other-bg);
            border-radius: 40px;
            padding: 8px 18px;
            width: fit-content;
            max-width: 80%;
            border: 1px solid var(--accent);
            box-shadow: 0 0 12px var(--accent);
        }
        .message.own { align-self: flex-end; background: var(--message-own-bg); }
        .msg-meta {
            font-size: 0.7rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }
        .msg-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--bg-elevated); border: 1px solid var(--accent); overflow: hidden; display: inline-flex; align-items: center; justify-content: center; }
        .profile-clickable { cursor: pointer; display: inline-flex; align-items: center; gap: 6px; font-weight: bold; color: var(--link-color); text-decoration: underline; background: none; border: none; font-size: inherit; padding: 0; }
        .input-group { display: flex; gap: 12px; margin-top: 16px; }
        .input-group input { flex: 1; background: var(--bg-elevated); border: 1px solid var(--accent); padding: 12px 18px; border-radius: 60px; color: var(--text-primary); outline: none; box-shadow: 0 0 5px var(--accent); }
        button { background: var(--btn-bg); border: 1px solid var(--accent); color: var(--text-primary); padding: 0 24px; border-radius: 60px; font-weight: bold; cursor: pointer; box-shadow: 0 0 5px var(--accent); }
        button:hover { background: var(--btn-hover); color: var(--btn-hover-text); box-shadow: 0 0 12px var(--accent); }

        .private-layout { display: flex; gap: 24px; flex-wrap: wrap; }
        .friends-panel, .search-panel { flex: 1; background: var(--bg-elevated); border-radius: 24px; padding: 18px; border: 1px solid var(--accent); box-shadow: 0 0 12px var(--accent); }
        .friend-card { display: flex; align-items: center; gap: 14px; padding: 10px; margin-bottom: 8px; border-radius: 20px; background: var(--bg-surface); border: 1px solid transparent; cursor: pointer; }
        .friend-card:hover { border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .pm-chat { margin-top: 24px; background: var(--bg-elevated); border-radius: 24px; padding: 16px; border: 1px solid var(--accent); }

        .modal {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #000000cc; backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center; z-index: 3000;
        }
        .modal-card {
            background: var(--bg-surface); border: 2px solid var(--accent);
            border-radius: 32px; padding: 28px; width: 480px; max-width: 95%;
            text-align: center;
            box-shadow: 0 0 30px var(--accent);
        }
        .modal-card input, .modal-card select, .modal-card textarea {
            background: var(--bg-elevated);
            border: 1px solid var(--accent);
            color: var(--text-primary);
            border-radius: 60px;
            padding: 10px 16px;
            width: 100%;
            margin: 8px 0;
            outline: none;
        }
        .avatar-preview { width: 80px; height: 80px; margin: 10px auto; border-radius: 50%; border: 2px solid var(--accent); overflow: hidden; background: var(--bg-elevated); display: flex; align-items: center; justify-content: center; font-size: 48px; }
        .admin-user-list { max-height: 300px; overflow-y: auto; text-align: left; margin: 15px 0; }
        .admin-user-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid var(--border-glow); flex-wrap: wrap; gap: 8px; }

        .loader-screen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: var(--bg-body); z-index: 2000;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.8s;
        }
        .loader-container { max-width: 900px; width: 90%; background: var(--bg-surface); border: 2px solid var(--accent); border-radius: 32px; padding: 2rem; }
        .console-box { background: var(--bg-elevated); border-radius: 20px; padding: 1.5rem; border-left: 4px solid var(--accent); }
        .console-header { color: var(--text-primary); border-bottom: 1px solid var(--accent); padding-bottom: 8px; margin-bottom: 20px; }
        .console-lines { min-height: 320px; overflow-y: auto; color: var(--text-secondary); }
        .line { margin-bottom: 8px; border-left: 2px solid var(--accent); padding-left: 12px; }
        .cursor-blink { display: inline-block; width: 10px; height: 16px; background: var(--accent); animation: blink 1s infinite; margin-left: 6px; box-shadow: var(--accent-glow); }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    </style>
</head>
<body data-theme="dark">

<div id="loaderScreen" class="loader-screen">
    <div class="loader-container">
        <div class="console-box">
            <div class="console-header">INCREMENTAL::FIREBASE BOOT</div>
            <div id="consoleLines" class="console-lines"></div>
        </div>
    </div>
</div>

<div class="global-logo"><div class="logo-oval"><span>INCREMENTAL</span></div></div>

<div id="app" class="app">
    <div class="top-bar">
        <div id="adminPanelBtn" style="display:none;"><button class="admin-btn">🛡️ Admin Panel</button></div>
        <div class="profile-oval" id="profileOvalBtn">
            <div class="small-avatar" id="topAvatar">👤</div>
            <span class="profile-nick" id="topNick">...</span>
            <span class="logout-icon" id="topLogoutBtn">🚪</span>
        </div>
    </div>
    <div class="tabs">
        <div class="tab active" data-tab="global">🌍 Global Chat</div>
        <div class="tab" data-tab="private">💬 Personal Chat</div>
        <div class="tab" data-tab="media">📱 Media</div>
    </div>
    <div id="globalPanel" class="panel">
        <div class="messages-area" id="globalMessagesArea"></div>
        <div class="input-group"><input type="text" id="globalMsgInput" placeholder="Сообщение..."><button id="sendGlobalBtn">Отправить</button></div>
    </div>
    <div id="privatePanel" class="panel">
        <div class="private-layout">
            <div class="friends-panel"><h3>🤝 Друзья</h3><div id="friendsList"></div><div class="pending-area" id="pendingRequestsArea"></div></div>
            <div class="search-panel">
                <h3>🔍 Поиск пользователей</h3>
                <div class="input-group" style="margin-bottom:10px">
                    <input type="text" id="searchNickInput" placeholder="Никнейм">
                    <button id="searchUserBtn">Найти</button>
                </div>
                <div id="searchResults"></div>
            </div>
        </div>
        <div class="pm-chat"><h3 id="pmTitle">💬 Личный диалог</h3><div class="messages-area" id="pmMessagesArea" style="height:30vh"></div><div class="input-group"><input type="text" id="pmInput" placeholder="Сообщение..." disabled><button id="sendPmBtn" disabled>Отправить</button></div></div>
    </div>
    <div id="mediaPanel" class="panel">
        <button class="neon-oval-btn add-post-btn" id="addPostBtn">➕ Создать пост</button>
        <div id="mediaFeed" class="media-feed"></div>
    </div>
</div>

<script>
    // ======================= ВАШ КОНФИГ FIREBASE (ВСТАВЛЕН) =======================
    const firebaseConfig = {
        apiKey: "AIzaSyCD0irAsFZ6sEHoFQ2Qv41MHuud9bfsJ2U",
        authDomain: "incremental-c330b.firebaseapp.com",
        projectId: "incremental-c330b",
        storageBucket: "incremental-c330b.firebasestorage.app",
        messagingSenderId: "841922159732",
        appId: "1:841922159732:web:2591bfd9db27c695545d21",
        measurementId: "G-4QT4LPV7J9"
    };
    // ============================================================================

    // Инициализация Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Настройка Firestore (для реального времени)
    db.settings({ timestampsInSnapshots: true });

    let currentUser = null;       // объект пользователя Firebase
    let currentUserData = null;   // дополнительные данные из Firestore (nick, avatar, theme, bio, isAdmin, banned)
    let currentPrivateChatWith = null;

    // Подписки на реальное время (unsubscribe функции)
    let unsubscribeGlobal = null;
    let unsubscribeUsers = null;
    let unsubscribeFriends = null;
    let unsubscribePending = null;
    let unsubscribePosts = null;

    // --- Вспомогательные функции ---
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, (m) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    // Загрузочная консоль
    function finishLoading() {
        setTimeout(() => {
            document.getElementById('loaderScreen').style.opacity = '0';
            setTimeout(() => document.getElementById('loaderScreen').style.display = 'none', 500);
        }, 800);
    }

    // --- Отображение экрана входа/регистрации ---
    function showAuthScreen() {
        const modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-card">
                <h2 style="margin-bottom:20px;">🔐 INCREMENTAL</h2>
                <div style="display:flex; gap:12px; justify-content:center; margin-bottom:20px;">
                    <button id="loginTabBtn" class="neon-oval-btn" style="margin:0;">Вход</button>
                    <button id="registerTabBtn" class="neon-oval-btn" style="margin:0;">Регистрация</button>
                </div>
                <div id="loginForm">
                    <input type="email" id="loginEmail" placeholder="Email" autocomplete="off">
                    <input type="password" id="loginPass" placeholder="Пароль">
                    <button id="doLoginBtn" class="neon-oval-btn" style="margin-top:12px;">Войти</button>
                </div>
                <div id="registerForm" style="display:none;">
                    <input type="text" id="regNick" placeholder="Никнейм">
                    <input type="email" id="regEmail" placeholder="Email">
                    <input type="password" id="regPass" placeholder="Пароль">
                    <button id="doRegBtn" class="neon-oval-btn" style="margin-top:12px;">Создать аккаунт</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        const loginTab = document.getElementById('loginTabBtn');
        const regTab = document.getElementById('registerTabBtn');
        const loginDiv = document.getElementById('loginForm');
        const regDiv = document.getElementById('registerForm');
        loginTab.onclick = () => { loginTab.style.background = 'var(--accent)'; loginTab.style.color = 'var(--btn-hover-text)'; regTab.style.background = 'transparent'; regTab.style.color = 'var(--text-primary)'; loginDiv.style.display = 'block'; regDiv.style.display = 'none'; };
        regTab.onclick = () => { regTab.style.background = 'var(--accent)'; regTab.style.color = 'var(--btn-hover-text)'; loginTab.style.background = 'transparent'; loginTab.style.color = 'var(--text-primary)'; loginDiv.style.display = 'none'; regDiv.style.display = 'block'; };
        document.getElementById('doLoginBtn').onclick = async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            try {
                await auth.signInWithEmailAndPassword(email, pass);
                modal.remove();
            } catch(e) { alert("Ошибка входа: " + e.message); }
        };
        document.getElementById('doRegBtn').onclick = async () => {
            const nick = document.getElementById('regNick').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPass').value.trim();
            if(!nick || !email || !pass) { alert("Заполните все поля"); return; }
            try {
                // Создаём пользователя в Auth
                const userCred = await auth.createUserWithEmailAndPassword(email, pass);
                const uid = userCred.user.uid;
                // Проверяем, есть ли уже пользователь с таким ником
                const nickCheck = await db.collection('users').where('nick', '==', nick).get();
                if(!nickCheck.empty) { alert("Никнейм уже занят"); await auth.currentUser.delete(); return; }
                // Первый пользователь в системе становится админом
                const usersSnapshot = await db.collection('users').get();
                const isAdmin = usersSnapshot.empty; // если нет ни одного пользователя
                // Сохраняем данные в Firestore
                await db.collection('users').doc(uid).set({
                    uid: uid,
                    nick: nick,
                    email: email,
                    avatarBase64: null,
                    theme: 'dark',
                    bio: '',
                    isAdmin: isAdmin,
                    banned: false,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("Регистрация успешна! Выполняется вход...");
                modal.remove();
            } catch(e) { alert("Ошибка регистрации: " + e.message); }
        };
    }

    // --- Загрузка данных пользователя и подписки ---
    async function loadUserData(uid) {
        const doc = await db.collection('users').doc(uid).get();
        if(!doc.exists) return null;
        return { uid: doc.id, ...doc.data() };
    }

    async function startApp(user) {
        currentUser = user;
        currentUserData = await loadUserData(user.uid);
        if(!currentUserData) { await auth.signOut(); return; }
        document.body.setAttribute('data-theme', currentUserData.theme || 'dark');
        // Подписываемся на коллекции
        subscribeToGlobalMessages();
        subscribeToUsers();
        subscribeToFriends();
        subscribeToPendingRequests();
        subscribeToPosts();
        renderUI();
        document.getElementById('app').style.display = 'block';
    }

    // --- Подписки реального времени ---
    function subscribeToGlobalMessages() {
        if(unsubscribeGlobal) unsubscribeGlobal();
        unsubscribeGlobal = db.collection('globalMessages').orderBy('timestamp', 'asc').onSnapshot(snapshot => {
            renderGlobalMessages(snapshot);
        });
    }
    function subscribeToUsers() {
        if(unsubscribeUsers) unsubscribeUsers();
        unsubscribeUsers = db.collection('users').onSnapshot(() => {
            searchUsers(); // обновляем поиск при изменении списка пользователей
            renderFriendsList(); // друзья
            renderPendingRequests();
            renderMediaFeed(); // посты могут зависеть от авторов
        });
    }
    function subscribeToFriends() {
        if(!currentUser) return;
        if(unsubscribeFriends) unsubscribeFriends();
        unsubscribeFriends = db.collection('friends').doc(currentUser.uid).onSnapshot(doc => {
            renderFriendsList();
        });
    }
    function subscribeToPendingRequests() {
        if(!currentUser) return;
        if(unsubscribePending) unsubscribePending();
        unsubscribePending = db.collection('friendRequests').where('toId', '==', currentUser.uid).onSnapshot(() => {
            renderPendingRequests();
        });
    }
    function subscribeToPosts() {
        if(unsubscribePosts) unsubscribePosts();
        unsubscribePosts = db.collection('posts').orderBy('timestamp', 'desc').onSnapshot(() => {
            renderMediaFeed();
        });
    }

    // --- Функции отрисовки ---
    function renderGlobalMessages(snapshot) {
        const container = document.getElementById('globalMessagesArea');
        if(!container) return;
        container.innerHTML = '';
        const messages = [];
        snapshot.forEach(doc => messages.push({ id: doc.id, ...doc.data() }));
        messages.reverse().forEach(msg => {
            if(msg.banned) return;
            const isOwn = msg.fromId === currentUser.uid;
            const div = document.createElement('div');
            div.className = `message ${isOwn ? 'own' : ''}`;
            const avatarUrl = msg.avatarBase64 || '';
            const avatarHtml = avatarUrl ? `<img src="${avatarUrl}" style="width:100%;height:100%;object-fit:cover">` : `<span>👤</span>`;
            div.innerHTML = `
                <div class="msg-meta">
                    <div class="msg-avatar">${avatarHtml}</div>
                    <button class="profile-clickable" data-userid="${msg.fromId}">${escapeHtml(msg.fromNick)}</button>
                    <span>${new Date(msg.timestamp?.toDate()).toLocaleTimeString()}</span>
                </div>
                <div>${escapeHtml(msg.text)}</div>
            `;
            container.prepend(div);
        });
        document.querySelectorAll('.profile-clickable').forEach(btn => {
            btn.addEventListener('click', (e) => { e.stopPropagation(); showUserProfile(btn.dataset.userid); });
        });
    }

    async function sendGlobalMessage() {
        if(currentUserData.banned) { alert("Вы забанены"); return; }
        const input = document.getElementById('globalMsgInput');
        const text = input.value.trim();
        if(!text) return;
        await db.collection('globalMessages').add({
            fromId: currentUser.uid,
            fromNick: currentUserData.nick,
            text: text,
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            avatarBase64: currentUserData.avatarBase64 || null,
            banned: false
        });
        input.value = '';
    }

    async function showUserProfile(uid) {
        const userDoc = await db.collection('users').doc(uid).get();
        if(!userDoc.exists) return;
        const user = { uid: userDoc.id, ...userDoc.data() };
        const isSelf = uid === currentUser.uid;
        // Проверяем, есть ли в друзьях
        const friendDoc = await db.collection('friends').doc(currentUser.uid).get();
        const friends = friendDoc.exists ? friendDoc.data().friends || [] : [];
        const isFriend = friends.includes(uid);
        // Проверяем, отправлена ли заявка
        const reqSnapshot = await db.collection('friendRequests').where('fromId', '==', currentUser.uid).where('toId', '==', uid).get();
        const requestSent = !reqSnapshot.empty;
        let actionButton = '';
        if(!isSelf && !isFriend && !requestSent && !user.banned) {
            actionButton = `<button class="neon-oval-btn" id="addFriendProfileBtn">➕ Добавить в друзья</button>`;
        } else if(!isSelf && requestSent) {
            actionButton = `<button class="neon-oval-btn" disabled>⏳ Заявка отправлена</button>`;
        } else if(!isSelf && isFriend) {
            actionButton = `<button class="neon-oval-btn" disabled>✓ Уже друг</button>`;
        }
        const modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-card">
                <h2>📋 Профиль</h2>
                <div class="avatar-preview" style="width:100px; height:100px; margin:0 auto 15px auto;">
                    ${user.avatarBase64 ? `<img src="${user.avatarBase64}" style="width:100%;height:100%;object-fit:cover">` : '<span style="font-size:64px">👤</span>'}
                </div>
                <div><strong>${escapeHtml(user.nick)}</strong> ${user.isAdmin ? '<span style="color:var(--admin-badge)">👑 Admin</span>' : ''} ${user.banned ? '<span style="color:#ff8888">⛔ Banned</span>' : ''}</div>
                <div style="margin:10px 0; padding:8px; background: var(--bg-elevated); border-radius: 20px;">${escapeHtml(user.bio || 'Описание отсутствует')}</div>
                ${actionButton}
                <button class="neon-oval-btn" id="closeProfileBtn">Закрыть</button>
            </div>
        `;
        document.body.appendChild(modal);
        if(actionButton && !isSelf && !isFriend && !requestSent && !user.banned) {
            document.getElementById('addFriendProfileBtn')?.addEventListener('click', async () => {
                await db.collection('friendRequests').add({ fromId: currentUser.uid, fromNick: currentUserData.nick, toId: uid, toNick: user.nick, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                alert(`Заявка отправлена ${user.nick}`);
                modal.remove();
            });
        }
        document.getElementById('closeProfileBtn').onclick = () => modal.remove();
    }

    async function renderFriendsList() {
        const container = document.getElementById('friendsList');
        if(!container) return;
        const friendDoc = await db.collection('friends').doc(currentUser.uid).get();
        const friendsIds = friendDoc.exists ? friendDoc.data().friends || [] : [];
        if(friendsIds.length === 0) { container.innerHTML = '<div>Нет друзей.</div>'; return; }
        container.innerHTML = '';
        for(const fid of friendsIds) {
            const userDoc = await db.collection('users').doc(fid).get();
            if(!userDoc.exists) continue;
            const friend = userDoc.data();
            if(friend.banned) continue;
            const div = document.createElement('div');
            div.className = 'friend-card';
            div.innerHTML = `<div class="friend-avatar">${friend.avatarBase64 ? `<img src="${friend.avatarBase64}" style="width:100%">` : '👤'}</div><div class="friend-info"><div class="friend-nick">${escapeHtml(friend.nick)}</div></div>`;
            div.onclick = () => openPrivateChat(fid);
            container.appendChild(div);
        }
    }

    async function openPrivateChat(friendId) {
        currentPrivateChatWith = friendId;
        const friendDoc = await db.collection('users').doc(friendId).get();
        const friend = friendDoc.data();
        document.getElementById('pmTitle').innerHTML = `💬 Чат с ${friend?.nick}`;
        document.getElementById('pmInput').disabled = false;
        document.getElementById('sendPmBtn').disabled = false;
        // Подписка на личные сообщения
        if(window.unsubscribePM) window.unsubscribePM();
        const chatId = [currentUser.uid, friendId].sort().join('_');
        window.unsubscribePM = db.collection('privateMessages').doc(chatId).collection('messages').orderBy('timestamp', 'asc').onSnapshot(snapshot => {
            const container = document.getElementById('pmMessagesArea');
            if(!container) return;
            container.innerHTML = '';
            snapshot.forEach(doc => {
                const msg = doc.data();
                const div = document.createElement('div');
                div.className = `message ${msg.fromId === currentUser.uid ? 'own' : ''}`;
                const senderName = msg.fromId === currentUser.uid ? 'Вы' : friend?.nick;
                div.innerHTML = `<div class="msg-meta"><span>${escapeHtml(senderName)}</span><span>${new Date(msg.timestamp?.toDate()).toLocaleTimeString()}</span></div><div>${escapeHtml(msg.text)}</div>`;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        });
    }

    async function sendPrivateMessage() {
        if(!currentPrivateChatWith) return;
        if(currentUserData.banned) { alert("Вы забанены"); return; }
        const input = document.getElementById('pmInput');
        const text = input.value.trim();
        if(!text) return;
        const chatId = [currentUser.uid, currentPrivateChatWith].sort().join('_');
        await db.collection('privateMessages').doc(chatId).collection('messages').add({
            fromId: currentUser.uid,
            text: text,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        input.value = '';
    }

    async function searchUsers() {
        const query = document.getElementById('searchNickInput').value.trim().toLowerCase();
        const container = document.getElementById('searchResults');
        if(!query) { container.innerHTML = ''; return; }
        const snapshot = await db.collection('users').get();
        const results = [];
        snapshot.forEach(doc => {
            const u = { uid: doc.id, ...doc.data() };
            if(u.uid !== currentUser.uid && u.nick.toLowerCase().includes(query) && !u.banned) results.push(u);
        });
        container.innerHTML = '';
        for(const u of results) {
            const friendDoc = await db.collection('friends').doc(currentUser.uid).get();
            const friends = friendDoc.exists ? friendDoc.data().friends || [] : [];
            const isFriend = friends.includes(u.uid);
            const reqSnapshot = await db.collection('friendRequests').where('fromId', '==', currentUser.uid).where('toId', '==', u.uid).get();
            const requestSent = !reqSnapshot.empty;
            let btnHtml = '';
            if(!isFriend && !requestSent) btnHtml = `<button class="addFriendBtn" data-id="${u.uid}">➕ Добавить</button>`;
            else if(requestSent) btnHtml = `<button disabled>⏳ Заявка отправлена</button>`;
            else if(isFriend) btnHtml = `<button disabled>✓ Друг</button>`;
            const card = document.createElement('div');
            card.className = 'search-result-card';
            card.style.background = 'var(--bg-elevated)';
            card.style.padding = '12px';
            card.style.marginTop = '12px';
            card.style.borderRadius = '24px';
            card.style.border = '1px solid var(--accent)';
            card.style.display = 'flex';
            card.style.alignItems = 'center';
            card.style.gap = '14px';
            card.innerHTML = `<div class="friend-avatar" style="width:48px;height:48px;">${u.avatarBase64 ? `<img src="${u.avatarBase64}" style="width:100%">` : '👤'}</div>
                             <div class="friend-info" style="flex:1;"><div class="friend-nick">${escapeHtml(u.nick)}</div></div>
                             ${btnHtml}`;
            container.appendChild(card);
        }
        document.querySelectorAll('.addFriendBtn').forEach(btn => {
            btn.onclick = async () => {
                const toId = btn.dataset.id;
                const toUser = results.find(u => u.uid === toId);
                await db.collection('friendRequests').add({ fromId: currentUser.uid, fromNick: currentUserData.nick, toId: toId, toNick: toUser.nick, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                alert(`Заявка отправлена ${toUser.nick}`);
                searchUsers();
            };
        });
    }

    async function renderPendingRequests() {
        const container = document.getElementById('pendingRequestsArea');
        if(!container) return;
        const snapshot = await db.collection('friendRequests').where('toId', '==', currentUser.uid).get();
        const requests = [];
        snapshot.forEach(doc => requests.push({ id: doc.id, ...doc.data() }));
        if(requests.length === 0) { container.innerHTML = '<div>📭 Нет заявок</div>'; return; }
        let html = '<strong>📨 Входящие:</strong><div>';
        for(const req of requests) {
            html += `<div style="display:flex; gap:8px; align-items:center; margin-top:8px;">👤 ${escapeHtml(req.fromNick)} <button data-accept="${req.fromId}" data-reqid="${req.id}">✅ Принять</button><button data-reject="${req.fromId}" data-reqid="${req.id}">❌</button></div>`;
        }
        html += '</div>';
        container.innerHTML = html;
        document.querySelectorAll('[data-accept]').forEach(btn => {
            btn.onclick = async () => {
                const fromId = btn.dataset.accept;
                const reqId = btn.dataset.reqid;
                // Добавляем в друзья
                const myFriendsRef = db.collection('friends').doc(currentUser.uid);
                const myFriendsDoc = await myFriendsRef.get();
                const myFriends = myFriendsDoc.exists ? myFriendsDoc.data().friends || [] : [];
                if(!myFriends.includes(fromId)) {
                    await myFriendsRef.set({ friends: [...myFriends, fromId] }, { merge: true });
                }
                const hisFriendsRef = db.collection('friends').doc(fromId);
                const hisFriendsDoc = await hisFriendsRef.get();
                const hisFriends = hisFriendsDoc.exists ? hisFriendsDoc.data().friends || [] : [];
                if(!hisFriends.includes(currentUser.uid)) {
                    await hisFriendsRef.set({ friends: [...hisFriends, currentUser.uid] }, { merge: true });
                }
                await db.collection('friendRequests').doc(reqId).delete();
                renderPendingRequests();
                renderFriendsList();
            };
        });
        document.querySelectorAll('[data-reject]').forEach(btn => {
            btn.onclick = async () => {
                const reqId = btn.dataset.reqid;
                await db.collection('friendRequests').doc(reqId).delete();
                renderPendingRequests();
            };
        });
    }

    async function renderMediaFeed() {
        const container = document.getElementById('mediaFeed');
        if(!container) return;
        const snapshot = await db.collection('posts').orderBy('timestamp', 'desc').get();
        if(snapshot.empty) { container.innerHTML = '<div style="text-align:center; padding:40px;">📭 Нет постов. Создайте первый!</div>'; return; }
        container.innerHTML = '';
        for(const doc of snapshot.docs) {
            const post = { id: doc.id, ...doc.data() };
            const authorDoc = await db.collection('users').doc(post.authorId).get();
            if(!authorDoc.exists || authorDoc.data().banned) continue;
            const author = authorDoc.data();
            const likeCount = post.likes?.length || 0;
            const canDelete = currentUserData.isAdmin || post.authorId === currentUser.uid;
            const postDiv = document.createElement('div');
            postDiv.className = 'media-post';
            postDiv.innerHTML = `
                <div class="post-header" data-authorid="${post.authorId}">
                    <div class="post-avatar">${author.avatarBase64 ? `<img src="${author.avatarBase64}" style="width:100%">` : '👤'}</div>
                    <div class="post-author">${escapeHtml(author.nick)}</div>
                    <div class="post-time">${new Date(post.timestamp?.toDate()).toLocaleString()}</div>
                </div>
                <div class="post-content">
                    <div class="post-text">${escapeHtml(post.text)}</div>
                    ${post.imageData ? `<img class="post-image" src="${post.imageData}" alt="post image">` : ''}
                </div>
                <div class="post-actions">
                    <button class="action-btn like-btn" data-postid="${post.id}">❤️ ${likeCount} Лайк</button>
                    ${canDelete ? `<button class="action-btn delete-post-btn" data-postid="${post.id}">🗑️ Удалить</button>` : ''}
                </div>
            `;
            container.appendChild(postDiv);
        }
        document.querySelectorAll('.post-header').forEach(header => {
            header.addEventListener('click', (e) => { e.stopPropagation(); showUserProfile(header.dataset.authorid); });
        });
        document.querySelectorAll('.like-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const postId = btn.dataset.postid;
                const postRef = db.collection('posts').doc(postId);
                const postDoc = await postRef.get();
                const likes = postDoc.data().likes || [];
                const idx = likes.indexOf(currentUser.uid);
                if(idx === -1) likes.push(currentUser.uid);
                else likes.splice(idx, 1);
                await postRef.update({ likes });
            });
        });
        document.querySelectorAll('.delete-post-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                if(confirm("Удалить пост?")) {
                    await db.collection('posts').doc(btn.dataset.postid).delete();
                }
            });
        });
    }

    async function showAddPostModal() {
        const modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `<div class="modal-card" style="width:500px;"><h2>📝 Новый пост</h2><textarea id="postText" placeholder="Текст поста..." rows="4" style="width:100%; background:var(--bg-elevated); border:1px solid var(--accent); border-radius:20px; padding:12px;"></textarea><div style="margin:10px 0;">Изображение:</div><input type="file" id="postImage" accept="image/*"><button id="publishPostBtn" class="neon-oval-btn">📤 Опубликовать</button><button id="closePostModal" class="neon-oval-btn">Отмена</button></div>`;
        document.body.appendChild(modal);
        document.getElementById('publishPostBtn').onclick = async () => {
            const text = document.getElementById('postText').value.trim();
            if(!text) { alert("Введите текст"); return; }
            const imageFile = document.getElementById('postImage').files[0];
            let imageData = null;
            if(imageFile) {
                const reader = new FileReader();
                imageData = await new Promise((resolve) => {
                    reader.onload = (e) => resolve(e.target.result);
                    reader.readAsDataURL(imageFile);
                });
            }
            await db.collection('posts').add({
                authorId: currentUser.uid,
                authorNick: currentUserData.nick,
                text: text,
                imageData: imageData,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                likes: []
            });
            modal.remove();
        };
        document.getElementById('closePostModal').onclick = () => modal.remove();
    }

    async function showAdminPanel() {
        if(!currentUserData.isAdmin) return;
        const snapshot = await db.collection('users').get();
        let usersHtml = '';
        snapshot.forEach(doc => {
            const u = { uid: doc.id, ...doc.data() };
            usersHtml += `<div class="admin-user-item"><div>${escapeHtml(u.nick)} ${u.isAdmin ? '👑' : ''} ${u.banned ? '🚫' : ''}</div><div>${!u.isAdmin ? `<button class="neon-oval-btn" data-makeadmin="${u.uid}">Назначить админом</button>` : (u.uid !== currentUser.uid ? `<button data-removeadmin="${u.uid}">Снять админа</button>` : '')} ${u.banned ? `<button data-unban="${u.uid}">Разбан</button>` : `<button data-ban="${u.uid}">Бан</button>`}</div></div>`;
        });
        const modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `<div class="modal-card"><h2>🛡️ Админ-панель</h2><div class="admin-user-list">${usersHtml}</div><button class="neon-oval-btn" id="closeAdminPanel">Закрыть</button></div>`;
        document.body.appendChild(modal);
        document.querySelectorAll('[data-makeadmin]').forEach(btn => {
            btn.onclick = async () => { await db.collection('users').doc(btn.dataset.makeadmin).update({ isAdmin: true }); modal.remove(); showAdminPanel(); };
        });
        document.querySelectorAll('[data-removeadmin]').forEach(btn => {
            btn.onclick = async () => { await db.collection('users').doc(btn.dataset.removeadmin).update({ isAdmin: false }); modal.remove(); showAdminPanel(); };
        });
        document.querySelectorAll('[data-ban]').forEach(btn => {
            btn.onclick = async () => { await db.collection('users').doc(btn.dataset.ban).update({ banned: true }); modal.remove(); showAdminPanel(); };
        });
        document.querySelectorAll('[data-unban]').forEach(btn => {
            btn.onclick = async () => { await db.collection('users').doc(btn.dataset.unban).update({ banned: false }); modal.remove(); showAdminPanel(); };
        });
        document.getElementById('closeAdminPanel').onclick = () => modal.remove();
    }

    async function showProfileSettings() {
        const modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-card">
                <h2>✨ Редактирование профиля</h2>
                <div class="avatar-preview" id="modalAvatarPreview">
                    ${currentUserData.avatarBase64 ? `<img src="${currentUserData.avatarBase64}" style="width:100%;height:100%;object-fit:cover">` : '<span>👤</span>'}
                </div>
                <input type="file" id="avatarUpload" accept="image/*">
                <input type="text" id="editNick" placeholder="Новый ник" value="${escapeHtml(currentUserData.nick)}">
                <textarea id="editBio" placeholder="Описание / статус" rows="2">${escapeHtml(currentUserData.bio || '')}</textarea>
                <select id="themeSelect">
                    <option value="dark" ${currentUserData.theme === 'dark' ? 'selected' : ''}>Чёрная неоновая</option>
                    <option value="white" ${currentUserData.theme === 'white' ? 'selected' : ''}>Белая неоновая</option>
                    <option value="green" ${currentUserData.theme === 'green' ? 'selected' : ''}>Зелёная неоновая</option>
                </select>
                <button id="saveSettingsBtn" class="neon-oval-btn" style="margin-top:20px;">💾 Сохранить</button>
                <button id="closeSettingsBtn" class="neon-oval-btn">Отмена</button>
            </div>
        `;
        document.body.appendChild(modal);
        const fileInput = document.getElementById('avatarUpload');
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    document.getElementById('modalAvatarPreview').innerHTML = `<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover">`;
                    currentUserData.avatarBase64 = ev.target.result;
                };
                reader.readAsDataURL(file);
            }
        };
        document.getElementById('saveSettingsBtn').onclick = async () => {
            const newNick = document.getElementById('editNick').value.trim();
            if(newNick && newNick !== currentUserData.nick) {
                const nickCheck = await db.collection('users').where('nick', '==', newNick).get();
                if(!nickCheck.empty && nickCheck.docs[0].id !== currentUser.uid) { alert("Никнейм уже занят"); return; }
                currentUserData.nick = newNick;
            }
            currentUserData.bio = document.getElementById('editBio').value.trim();
            currentUserData.theme = document.getElementById('themeSelect').value;
            await db.collection('users').doc(currentUser.uid).update({
                nick: currentUserData.nick,
                avatarBase64: currentUserData.avatarBase64,
                bio: currentUserData.bio,
                theme: currentUserData.theme
            });
            document.body.setAttribute('data-theme', currentUserData.theme);
            modal.remove();
            renderUI();
        };
        document.getElementById('closeSettingsBtn').onclick = () => modal.remove();
    }

    function renderUI() {
        document.getElementById('topNick').innerText = currentUserData.nick;
        const avatarDiv = document.getElementById('topAvatar');
        if(currentUserData.avatarBase64) avatarDiv.innerHTML = `<img src="${currentUserData.avatarBase64}">`;
        else avatarDiv.innerHTML = '<span>👤</span>';
        const adminBtnContainer = document.getElementById('adminPanelBtn');
        if(currentUserData.isAdmin) { adminBtnContainer.style.display = 'block'; adminBtnContainer.onclick = () => showAdminPanel(); }
        else adminBtnContainer.style.display = 'none';
        document.getElementById('profileOvalBtn').onclick = (e) => { if(e.target.id !== 'topLogoutBtn') showProfileSettings(); };
        document.getElementById('topLogoutBtn').onclick = async () => { await auth.signOut(); location.reload(); };
        document.querySelectorAll('.tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const type = tab.dataset.tab;
                document.getElementById('globalPanel').style.display = type === 'global' ? 'block' : 'none';
                document.getElementById('privatePanel').style.display = type === 'private' ? 'block' : 'none';
                document.getElementById('mediaPanel').style.display = type === 'media' ? 'block' : 'none';
                if(type === 'private') { renderFriendsList(); renderPendingRequests(); }
                if(type === 'media') renderMediaFeed();
            };
        });
        document.getElementById('sendGlobalBtn').onclick = () => sendGlobalMessage();
        document.getElementById('globalMsgInput').addEventListener('keypress', e => { if(e.key === 'Enter') sendGlobalMessage(); });
        document.getElementById('searchUserBtn').onclick = () => searchUsers();
        document.getElementById('sendPmBtn').onclick = () => sendPrivateMessage();
        document.getElementById('pmInput').addEventListener('keypress', e => { if(e.key === 'Enter') sendPrivateMessage(); });
        document.getElementById('addPostBtn').onclick = () => showAddPostModal();
    }

    // --- Слушатель входа в Firebase ---
    auth.onAuthStateChanged(async (user) => {
        if(user) {
            await startApp(user);
            finishLoading();
        } else {
            showAuthScreen();
            finishLoading();
        }
    });
</script>
</body>
</html>
